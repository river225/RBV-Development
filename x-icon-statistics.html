  <style>
    .icon-stats-container {
      max-width: 700px;
      margin: 100px auto 60px;
      padding: 40px;
      background: linear-gradient(135deg, #1a2332 0%, #2a3a4a 100%);
      border: 2px solid #33cce6;
      border-radius: 12px;
    }
    .icon-stats-container h1 {
      color: #33cce6;
      text-align: center;
      margin-bottom: 30px;
      text-shadow: 2px 2px 0 #000, -2px 2px 0 #000, 2px -2px 0 #000, -2px -2px 0 #000;
    }
    .icon-stats-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      margin-bottom: 12px;
      background: rgba(0,0,0,0.25);
      border-radius: 8px;
      border: 1px solid rgba(51, 204, 230, 0.3);
    }
    .icon-stats-row .label { color: #fff; font-weight: 600; }
    .icon-stats-row .value { color: #33cce6; font-size: 1.25rem; font-weight: 700; }
    .icon-stats-link {
      display: inline-block;
      margin-top: 24px;
      color: #33cce6;
      text-decoration: underline;
    }
    .icon-stats-link:hover { color: #5bc5de; }
    .back-btn-top {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 10px 20px;
      background: #33cce6;
      color: #000;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 0.9rem;
    }
    .back-btn-top:hover { background: #5bc5de; }
    .icon-stats-container { position: relative; padding-top: 50px; }
    .icon-stats-note { color: rgba(255,255,255,0.7); font-size: 0.9rem; margin-top: 16px; }
  </style>

  <script>
    (function() {
      if (typeof getIconStats !== 'function') return;
      getIconStats().then(function(d) {
        var elTotal = document.getElementById('total-downloads');
        var elActive = document.getElementById('active-users');
        if (elTotal) elTotal.textContent = d.error ? '—' : (d.totalDownloads + '');
        if (elActive) elActive.textContent = d.error ? '—' : (d.activeUsers + '');
      });
    })();
